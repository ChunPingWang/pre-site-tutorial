---
apiVersion: v1
kind: ConfigMap
metadata:
  name: petclinic-db-config
  namespace: sit
data:
  POSTGRES_HOST: "postgres.sit.svc"
  POSTGRES_DB: "petclinic"
  # v2.2 §3 決策 #5: SIT 用 sit profile (baseline-on-migrate=true)
  SPRING_PROFILES_ACTIVE: "sit"
  CUSTOMERS_SERVICE_URI: "http://customers-service.sit.svc:8081"
  VETS_SERVICE_URI:      "http://vets-service.sit.svc:8083"
  VISITS_SERVICE_URI:    "http://visits-service.sit.svc:8082"
  JAVA_TOOL_OPTIONS: "-Xmx256m -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=48m"
# credentials 已移至 06-sealed-db-credentials.yaml（SealedSecret）
