apiVersion: v1
kind: ServiceAccount
metadata:
  name: presit-editor-sa
  namespace: pre-sit
---
# Allow creating Argo Workflows in the argo namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: presit-editor-workflow-creator
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflows"]
  verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: presit-editor-workflow-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: presit-editor-workflow-creator
subjects:
- kind: ServiceAccount
  name: presit-editor-sa
  namespace: pre-sit
