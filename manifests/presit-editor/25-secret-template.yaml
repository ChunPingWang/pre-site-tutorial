# 注意：此檔為範本，請勿直接套用。
# 執行以下指令建立 Secret（需先設定 GITHUB_TOKEN 環境變數）：
#
#   kubectl create secret generic presit-editor-git \
#     --namespace pre-sit \
#     --from-literal=GITHUB_TOKEN="${GITHUB_TOKEN}" \
#     --from-literal=GIT_USER="presit-editor" \
#     --from-literal=GIT_EMAIL="presit-editor@presit.local"
#
apiVersion: v1
kind: Secret
metadata:
  name: presit-editor-git
  namespace: pre-sit
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-pat-here>"
  GIT_USER: "presit-editor"
  GIT_EMAIL: "presit-editor@presit.local"
