  labels:
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames: [pre-sit]
  selector:
    matchLabels:
      app: visits-service
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: petclinic-pre-sit-gateway
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames: [pre-sit]
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
