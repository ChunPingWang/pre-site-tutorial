---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-presit-runner
  namespace: argo
---
# pre-sit namespace：操作 BDD Jobs、PVC、Deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-presit
  namespace: pre-sit
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints",
              "persistentvolumeclaims", "events"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "statefulsets"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-presit
  namespace: pre-sit
subjects:
- kind: ServiceAccount
  name: argo-presit-runner
  namespace: argo
roleRef:
  kind: Role
  name: argo-presit
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-wide：讀 sit pods + ArgoCD Applications
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-cluster-reader
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "pods/log", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-cluster-reader
subjects:
- kind: ServiceAccount
  name: argo-presit-runner
  namespace: argo
roleRef:
  kind: ClusterRole
  name: argo-cluster-reader
  apiGroup: rbac.authorization.k8s.io
---
# Argo Workflows controller 需要此 Role 管理 argo namespace 的 Workflow 資源
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-presit-runner-argo
  namespace: argo
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflows", "workflowtemplates", "workflowartifactgctasks"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-presit-runner-argo
  namespace: argo
subjects:
- kind: ServiceAccount
  name: argo-presit-runner
  namespace: argo
roleRef:
  kind: Role
  name: argo-presit-runner-argo
  apiGroup: rbac.authorization.k8s.io
