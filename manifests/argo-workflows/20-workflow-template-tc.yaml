apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: presit-pipeline-tc
  namespace: argo
  labels:
    app: presit-pipeline-tc
  annotations:
    description: "feat/testcontainers-kind — Phase 1 改用 Testcontainers 自管 PostgreSQL"
spec:
  serviceAccountName: argo-presit-runner
  entrypoint: pipeline
  activeDeadlineSeconds: 1800

  arguments:
    parameters:
    - name: ns
      value: pre-sit
    - name: sit-ns
      value: sit
    - name: git-repo
      value: https://github.com/ChunPingWang/pre-site-tutorial.git
    - name: git-revision
      value: feat/testcontainers-kind

  templates:

  # ── 主流程：5 個依序執行的 step ─────────────────────────────────────────────
  - name: pipeline
    steps:
    - - name: preflight
        template: preflight
    - - name: reset-presit-tc
        template: reset-presit-tc
    - - name: apply-bdd-jobs-tc
        template: apply-bdd-jobs-tc
    - - name: wait-phase4
        template: wait-phase4
    - - name: check-sit-state
        template: check-sit-state

  # ── Step 1: Preflight ────────────────────────────────────────────────────────
  - name: preflight
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        set -e
        NS="{{workflow.parameters.ns}}"
        kubectl version --client=true 2>&1 | head -3
        kubectl get ns "${NS}" >/dev/null || { echo "❌ Namespace ${NS} not found"; exit 1; }
        kubectl get ns sit >/dev/null || { echo "❌ Namespace sit not found"; exit 1; }
        kubectl -n argocd get application petclinic-pre-sit petclinic-sit
        echo "✅ Preflight 通過"

  # ── Step 2: Reset Pre-SIT（TC 版）─────────────────────────────────────────────
  # 差異：不再重啟 postgres-0（Phase 1 的 DB 由 TC 管理）
  #       仍重啟 PetClinic 服務（Phase 2-4 使用 pre-sit namespace 的 postgres）
  - name: reset-presit-tc
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        NS="{{workflow.parameters.ns}}"
        echo "=== 清除舊 BDD Jobs ==="
        kubectl delete jobs -n "${NS}" -l app=presit-validation 2>&1 | head -10 || true
        echo "=== 清除舊 Reports PVC ==="
        kubectl delete job presit-ui-screenshot -n "${NS}" --ignore-not-found >/dev/null
        kubectl scale deployment report-server -n "${NS}" --replicas=0 2>/dev/null || true
        kubectl wait pod -n "${NS}" -l app=report-server --for=delete --timeout=30s 2>/dev/null || true
        kubectl delete pvc presit-reports -n "${NS}" 2>&1 | head -3 || true
        echo "=== 重啟 Postgres（Phase 2-4 使用，Phase 1 由 TC 獨立管理）==="
        kubectl -n "${NS}" delete pod postgres-0 --ignore-not-found 2>&1 | head -3
        kubectl -n "${NS}" wait --for=condition=Ready pod/postgres-0 --timeout=120s
        echo "=== 重啟 PetClinic 服務 ==="
        kubectl -n "${NS}" rollout restart deployment customers-service vets-service visits-service
        kubectl -n "${NS}" wait --for=condition=Available deployment --all --timeout=300s
        echo "✅ Pre-SIT 環境重置完成（TC 版）"

  # ── Step 3: Apply BDD Jobs（TC 版，指向 pre-sit-tc manifests）───────────────
  - name: apply-bdd-jobs-tc
    inputs:
      artifacts:
      - name: repo
        path: /workspace
        git:
          repo: "{{workflow.parameters.git-repo}}"
          revision: "{{workflow.parameters.git-revision}}"
          depth: 1
          insecureIgnoreHostKey: true
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        echo "=== 套用 TC BDD Jobs ==="
        kubectl apply -f /workspace/manifests/pre-sit-tc/30-bdd-jobs.yaml
        echo "=== 套用 UI 截圖 ConfigMap + Report Server ==="
        kubectl apply -f /workspace/manifests/pre-sit/40-ui-screenshot.yaml
        kubectl scale deployment report-server -n pre-sit --replicas=1 2>/dev/null || true
        echo "✅ TC BDD Jobs 已提交"

  # ── Step 4: Wait Phase 4（不變）─────────────────────────────────────────────
  - name: wait-phase4
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        NS="{{workflow.parameters.ns}}"
        DEADLINE=$(($(date +%s) + 1800))
        echo "=== 等待 Phase 4 e2e-decision Job 完成 ==="
        until kubectl get job presit-phase4-e2e-decision -n "${NS}" \
            -o jsonpath='{.status.conditions[*].type}' 2>/dev/null \
            | grep -qE 'Complete|Failed|SuccessCriteriaMet'; do
          if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
            echo "❌ TIMEOUT：Phase 4 未在 30 分鐘內完成"
            exit 1
          fi
          echo "  $(date '+%H:%M:%S') 等待中..."
          sleep 15
        done
        STATUS=$(kubectl get job presit-phase4-e2e-decision -n "${NS}" \
          -o jsonpath='{.status.conditions[*].type}')
        echo "Phase 4 結束，狀態：${STATUS}"
        if echo "${STATUS}" | grep -q "Failed"; then
          echo "❌ Phase 4 失敗（NOGO）"
          kubectl logs job/presit-phase4-e2e-decision -n "${NS}" 2>/dev/null | grep '"decision"' | tail -1
          exit 1
        fi
        kubectl logs job/presit-phase4-e2e-decision -n "${NS}" 2>/dev/null | grep '"decision"' | tail -1
        echo "✅ Pre-SIT 通過（GO）"

  # ── Step 5: Check SIT State（不變）──────────────────────────────────────────
  - name: check-sit-state
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        SIT_NS="{{workflow.parameters.sit-ns}}"
        echo "=== ArgoCD SIT Application 狀態 ==="
        kubectl -n argocd get application petclinic-sit
        echo ""
        echo "=== SIT 四個 Deployment 目前 image ==="
        for d in customers-service vets-service visits-service api-gateway; do
          printf "  %-22s " "${d}:"
          kubectl -n "${SIT_NS}" get deployment "${d}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "(找不到)"
          echo
        done
        echo ""
        echo "✅ Pipeline 完成（GO）— TC 版 Phase 1 無需外部 DB pod"
