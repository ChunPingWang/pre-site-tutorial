---
apiVersion: v1
kind: ServiceAccount
metadata: { name: jenkins, namespace: jenkins }
---
# Jenkins 在 pre-sit namespace 內：操作 BDD Jobs、PVC、deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: jenkins-presit, namespace: pre-sit }
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints", "persistentvolumeclaims", "events"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "statefulsets"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: jenkins-presit, namespace: pre-sit }
subjects:
- { kind: ServiceAccount, name: jenkins, namespace: jenkins }
roleRef:
  kind: Role
  name: jenkins-presit
  apiGroup: rbac.authorization.k8s.io
---
# Cross-namespace: 讀 sit pod (驗 promote 後狀態) + ArgoCD app (驗 sync 狀態)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: jenkins-cluster-reader }
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: jenkins-cluster-reader }
subjects:
- { kind: ServiceAccount, name: jenkins, namespace: jenkins }
roleRef:
  kind: ClusterRole
  name: jenkins-cluster-reader
  apiGroup: rbac.authorization.k8s.io
