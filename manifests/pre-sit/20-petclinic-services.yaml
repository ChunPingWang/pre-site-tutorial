---
# customers-service
apiVersion: v1
kind: Service
metadata: { name: customers-service, namespace: pre-sit, labels: { app: customers-service } }
spec:
  ports: [{ name: http, port: 8081, targetPort: 8081 }]
  selector: { app: customers-service }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: customers-service, namespace: pre-sit, labels: { app: customers-service } }
spec:
  replicas: 1
  selector: { matchLabels: { app: customers-service } }
  template:
    metadata: { labels: { app: customers-service } }
    spec:
      containers:
      - name: app
        image: localhost:5000/petclinic-customers-service:v2.2
        imagePullPolicy: Always
        ports: [{ containerPort: 8081 }]
        envFrom:
        - { configMapRef: { name: petclinic-db-config } }
        - { secretRef:    { name: petclinic-db-credentials } }
        readinessProbe:
          httpGet: { path: /actuator/health, port: 8081 }
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests: { cpu: 100m, memory: 384Mi }
          limits:   { cpu: 1,    memory: 768Mi }
