---
# api-gateway
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: pre-sit, labels: { app: api-gateway } }
spec:
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
  selector: { app: api-gateway }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: pre-sit, labels: { app: api-gateway } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
      - name: app
        image: localhost:5000/petclinic-api-gateway:v2.2
        imagePullPolicy: Always
        ports: [{ containerPort: 8080 }]
        # 不需 DB Secret，只需要 ConfigMap 的 *_SERVICE_URI 與 JAVA_TOOL_OPTIONS
        envFrom:
        - { configMapRef: { name: petclinic-db-config } }
        readinessProbe:
          httpGet: { path: /actuator/health, port: 8080 }
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests: { cpu: 100m, memory: 384Mi }
          limits:   { cpu: 1,    memory: 768Mi }
