---
apiVersion: batch/v1
kind: Job
metadata:
  name: presit-phase4-e2e-decision
  namespace: pre-sit
  labels: { app: presit-validation, phase: "4" }
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  template:
    metadata: { labels: { app: presit-validation, phase: "4" } }
    spec:
      restartPolicy: Never
      serviceAccountName: presit-sa
      initContainers:
      - name: wait-for-phase3
        image: bitnami/kubectl:latest
        command: ['sh','-c','kubectl wait --for=condition=complete job/presit-phase3-integration -n pre-sit --timeout=900s || true']
      containers:
      - name: bdd-runner
        image: localhost:5000/presit-bdd-runner:v2.2
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          mvn test -P phase-4 -q ; RC=$?
          mkdir -p /reports/phase-4 && cp -r reports/. /reports/phase-4/ 2>/dev/null || true
          if [ -f /reports/presit-decision.json ]; then
            echo '==== Pre-SIT Decision ===='
            cat /reports/presit-decision.json
          fi
          exit $RC
        env:
        - { name: DB_HOST, value: "postgres" }
        - { name: DB_PORT, value: "5432" }
        - { name: DB_NAME, value: "petclinic" }
        - { name: DB_USER, valueFrom: { secretKeyRef: { name: petclinic-db-credentials, key: POSTGRES_USER } } }
        - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: petclinic-db-credentials, key: POSTGRES_PASSWORD } } }
        - { name: GATEWAY_URL, value: "http://api-gateway:8080" }
        - { name: REPORT_DIR, value: "/reports" }
        volumeMounts: [{ name: reports, mountPath: /reports }]
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 2,    memory: 1Gi }
      volumes:
      - name: reports
        persistentVolumeClaim: { claimName: presit-reports }
