# visits-service — v2.2

spring:
  application:
    name: visits-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: visits_schema

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    org.springframework: INFO
    org.flywaydb: INFO

---
spring:
  config:
    activate:
      on-profile: presit
  datasource:
    url:      jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:petclinic}?currentSchema=visits_schema
    username: ${POSTGRES_USER:petclinic}
    password: ${POSTGRES_PASSWORD:petclinic}
    hikari:
      maximum-pool-size: 5
  flyway:
    enabled: true
    schemas: visits_schema
    default-schema: visits_schema
    create-schemas: true
    baseline-on-migrate: false

---
spring:
  config:
    activate:
      on-profile: sit
  datasource:
    url:      jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:petclinic}?currentSchema=visits_schema
    username: ${POSTGRES_USER:petclinic}
    password: ${POSTGRES_PASSWORD:petclinic}
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    schemas: visits_schema
    default-schema: visits_schema
    create-schemas: true
    baseline-on-migrate: true
