---
apiVersion: v1
kind: Service
metadata: { name: customers-service, namespace: pre-sit }
spec:
  ports: [{ port: 8081 }]
  selector: { app: customers-service }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: customers-service, namespace: pre-sit }
spec:
  replicas: 1
  selector: { matchLabels: { app: customers-service } }
  template:
    metadata: { labels: { app: customers-service } }
    spec:
      containers:
      - name: app
        image: springcommunity/spring-petclinic-customers-service:3.2.0
        ports: [{ containerPort: 8081 }]
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: CONFIG_SERVER_URL
          value: "http://config-server:8888/"
        - name: JAVA_TOOL_OPTIONS
          value: "-Xmx200m -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=48m"
        - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
          value: "always"
        readinessProbe:
          httpGet: { path: /actuator/health, port: 8081 }
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests: { cpu: 100m, memory: 384Mi }
          limits:   { cpu: 1,    memory: 768Mi }
