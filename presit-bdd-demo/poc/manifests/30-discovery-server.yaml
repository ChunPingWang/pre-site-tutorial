---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: pre-sit
spec:
  ports: [{ port: 8761 }]
  selector: { app: discovery-server }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: pre-sit
spec:
  replicas: 1
  selector:
    matchLabels: { app: discovery-server }
  template:
    metadata:
      labels: { app: discovery-server }
    spec:
      containers:
      - name: discovery-server
        image: springcommunity/spring-petclinic-discovery-server:3.2.0
        ports: [{ containerPort: 8761 }]
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: CONFIG_SERVER_URL
          value: "http://config-server:8888/"
        readinessProbe:
          httpGet: { path: /actuator/health, port: 8761 }
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests: { cpu: 100m, memory: 384Mi }
          limits:   { cpu: 1,    memory: 768Mi }
